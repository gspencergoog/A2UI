name: Web and Node.js CI

on:
  push:
    branches: [main]
    paths:
      - "renderers/**"
      - "tools/**"
      - "samples/client/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/web_ci.yml"
      - ".github/actions/setup-node/**"
  pull_request:
    paths:
      - "renderers/**"
      - "tools/**"
      - "samples/client/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/web_ci.yml"
      - ".github/actions/setup-node/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci-renderers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Build Renderers
        run: yarn workspaces foreach --include 'renderers/*' --include 'renderers/**/*' -p --topological-dev run build
      - name: Test Renderers
        run: yarn workspaces foreach --include 'renderers/*' --include 'renderers/**/*' -p run test
      - name: Verify NPM Publish Script
        run: node --test renderers/scripts/publish_npm.test.mjs

  ci-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Build Dependencies
        run: yarn build:all
      - name: Test Tools
        run: yarn workspaces foreach --include 'tools/*' --include 'tools/**/*' -p run test

  ci-samples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Build Dependencies
        run: yarn build:all
      - name: Test Samples
        run: yarn workspaces foreach --include 'samples/client/**' --include 'samples/mcp/**' -p run test
