name: Web and Node.js CI

on:
  push:
    branches: [main]
    paths:
      - "renderers/**"
      - "tools/**"
      - "samples/client/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/web_ci.yml"
      - ".github/actions/setup-node/**"
  pull_request:
    paths:
      - "renderers/**"
      - "tools/**"
      - "samples/client/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/web_ci.yml"
      - ".github/actions/setup-node/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RENDERERS_INC: "--include 'renderers/*' --include 'renderers/**/*'"
  TOOLS_INC: "--include 'tools/*' --include 'tools/**/*'"
  SAMPLES_INC: "--include 'samples/client/**' --include 'samples/mcp/**'"

jobs:
  ci-renderers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Build Renderers
        run: eval "yarn workspaces foreach $RENDERERS_INC -p --topological-dev run build"
      - name: Test Renderers
        run: eval "yarn workspaces foreach $RENDERERS_INC -p run test"
      - name: Verify NPM Publish Script
        run: node --test renderers/scripts/publish_npm.test.mjs

  ci-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Build Tools
        run: eval "yarn workspaces foreach $TOOLS_INC -p --topological-dev -R run build"
      - name: Test Tools
        run: eval "yarn workspaces foreach $TOOLS_INC -p run test"

  ci-samples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Build Samples
        run: eval "yarn workspaces foreach $SAMPLES_INC -p --topological-dev -R run build"
      - name: Test Samples
        run: eval "yarn workspaces foreach $SAMPLES_INC -p run test"

  ci-other:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Build Dependencies
        run: yarn build:all
      - name: Test Other Workspaces
        run: |
          EXCLUDE=$(echo "$RENDERERS_INC $TOOLS_INC $SAMPLES_INC" | sed 's/--include/--exclude/g')
          eval "yarn workspaces foreach $EXCLUDE -p run test"
