name: React renderer

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'renderers/angular/**'
      - 'renderers/flutter/**'
      - 'renderers/lit/**'
      - 'samples/agent/adk/**'
  pull_request:
    paths-ignore:
      - 'renderers/angular/**'
      - 'renderers/flutter/**'
      - 'renderers/lit/**'
      - 'samples/agent/adk/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Build web_core dependency
        working-directory: ./renderers/web_core
        run: |
          yarn install --immutable
          yarn build

      - name: Install React renderer deps
        run: yarn install --immutable

      - name: Build React renderer
        working-directory: ./renderers/react
        run: yarn build

      - name: Test React renderer
        working-directory: ./renderers/react
        run: yarn test

  build-and-test-demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Build web_core dependency
        working-directory: ./renderers/web_core
        run: |
          yarn install --immutable
          yarn build

      - name: Install React renderer deps
        run: yarn install --immutable

      - name: Build React Demo
        working-directory: ./renderers/react
        run: yarn build:demo

      - name: Test React Demo
        working-directory: ./renderers/react
        run: yarn test:demo

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Build web_core dependency
        working-directory: ./renderers/web_core
        run: |
          yarn install --immutable
          yarn build

      - name: Install React renderer deps
        run: yarn install --immutable

      - name: Build React renderer and its dependencies
        working-directory: ./renderers/react
        run: yarn lint

