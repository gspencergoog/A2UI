name: Setup Node.js
description: Configures Corepack, Node.js, and Yarn with dependency caching
inputs:
  node-version:
    description: Target Node.js version
    default: "22"
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: "yarn"
    - run: corepack enable
      shell: bash
    - run: yarn install --immutable
      shell: bash
